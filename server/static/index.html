<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilge · yerelLLM</title>
<style>
  :root {
    --bg:#0f1117; --panel:#171a23; --user:#2563eb; --ai:#222634;
    --text:#e6e8ee; --muted:#8b91a3; --border:#272b38; --accent:#4ade80; --learn:#f59e0b;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
  header { padding:12px 18px; border-bottom:1px solid var(--border);
           display:flex; align-items:center; gap:10px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  .dot { width:9px; height:9px; border-radius:50%; background:#666; }
  .dot.on { background:var(--accent); box-shadow:0 0 8px var(--accent); }
  #status { font-size:12px; color:var(--muted); }
  .learnpill { font-size:11px; color:var(--learn); border:1px solid var(--learn);
               border-radius:20px; padding:2px 9px; margin-left:auto; }
  #chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width:760px; padding:11px 15px; border-radius:14px; line-height:1.5;
         white-space:pre-wrap; word-wrap:break-word; }
  .msg.user { background:var(--user); align-self:flex-end; border-bottom-right-radius:4px; }
  .msg.ai { background:var(--ai); align-self:flex-start; border-bottom-left-radius:4px;
            border:1px solid var(--border); }
  .role { font-size:11px; color:var(--muted); margin:0 6px 3px; }
  .row { display:flex; flex-direction:column; }
  .row.user { align-items:flex-end; }
  .actions { display:flex; gap:8px; margin:5px 6px 0; }
  .act { font-size:11px; color:var(--muted); background:transparent; border:1px solid var(--border);
         border-radius:8px; padding:3px 9px; cursor:pointer; }
  .act:hover { color:var(--text); border-color:var(--learn); }
  .act.learned { color:var(--learn); border-color:var(--learn); cursor:default; }
  .teachbox { display:flex; flex-direction:column; gap:6px; margin:6px 6px 0; max-width:760px; }
  .teachbox textarea { background:var(--panel); color:var(--text); border:1px solid var(--learn);
         border-radius:10px; padding:9px 12px; font:inherit; font-size:13px; min-height:64px; resize:vertical; }
  .teachbox .tbtns { display:flex; gap:8px; }
  footer { padding:14px 18px; border-top:1px solid var(--border); }
  .inputbar { display:flex; gap:10px; max-width:820px; margin:0 auto; }
  textarea#input { flex:1; resize:none; background:var(--panel); color:var(--text);
             border:1px solid var(--border); border-radius:12px; padding:11px 14px;
             font-size:14px; font-family:inherit; max-height:140px; }
  textarea#input:focus { outline:none; border-color:var(--user); }
  button.primary { background:var(--user); color:#fff; border:none; border-radius:12px;
           padding:0 20px; font-size:14px; font-weight:600; cursor:pointer; }
  button.primary:disabled { opacity:.5; cursor:not-allowed; }
  .controls { max-width:820px; margin:8px auto 0; display:flex; gap:16px;
              font-size:12px; color:var(--muted); align-items:center; flex-wrap:wrap; }
  .controls label { display:flex; gap:6px; align-items:center; }
  input[type=range] { width:90px; }
  .mini { padding:4px 12px; font-size:12px; background:#333; color:var(--text);
          border:none; border-radius:8px; cursor:pointer; }
  .blink::after { content:"▍"; animation:b 1s steps(2) infinite; color:var(--accent); }
  @keyframes b { 50%{opacity:0;} }
  #toast { position:fixed; left:50%; transform:translateX(-50%); bottom:90px;
           background:var(--learn); color:#1a1206; font-size:13px; font-weight:600;
           padding:8px 16px; border-radius:10px; opacity:0; transition:opacity .25s;
           pointer-events:none; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1>Bilge</h1>
    <span id="status">baglaniyor…</span>
    <span class="learnpill" id="learnpill">öğrenme: açık</span>
  </header>

  <div id="chat"></div>

  <footer>
    <div class="inputbar">
      <textarea id="input" rows="1" placeholder="Bilge'ye bir mesaj yaz… (Enter = gonder, Shift+Enter = yeni satir)"></textarea>
      <button id="send" class="primary">Gonder</button>
    </div>
    <div class="controls">
      <label>sicaklik <input type="range" id="temp" min="0" max="1.5" step="0.05" value="0.3"><span id="tempv">0.30</span></label>
      <label>max token <input type="range" id="maxtok" min="32" max="512" step="32" value="160"><span id="maxtokv">160</span></label>
      <button id="save" class="mini" title="Online ogrenmeyle guncellenen modeli diske yaz">Öğrenileni kaydet</button>
      <button id="weblearn" class="mini" title="web_sources.json'daki siteleri gezip ogren">🌐 Web'den öğren</button>
      <button id="clear" class="mini">Temizle</button>
      <span id="webstat" style="font-size:11px;color:var(--muted);"></span>
    </div>
  </footer>

  <div id="toast"></div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const temp = document.getElementById('temp');
const maxtok = document.getElementById('maxtok');
let history = [];
let busy = false;

temp.oninput = () => document.getElementById('tempv').textContent = (+temp.value).toFixed(2);
maxtok.oninput = () => document.getElementById('maxtokv').textContent = maxtok.value;
input.addEventListener('input', () => {
  input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.onclick = send;
document.getElementById('clear').onclick = () => { history = []; chat.innerHTML = ''; };
document.getElementById('save').onclick = saveModel;

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? 'var(--learn)' : '#ef4444';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

async function health() {
  try {
    const r = await fetch('/api/health'); const j = await r.json();
    const dot = document.getElementById('dot'); const st = document.getElementById('status');
    if (j.ready) { dot.classList.add('on'); st.textContent = `hazir · ${Math.round(j.params_m)}M · ${j.device}`; }
    else { st.textContent = 'model yuklenmedi (once egit)'; }
  } catch { document.getElementById('status').textContent = 'sunucuya ulasilamadi'; }
}
health();

// --- web'den ogrenme kontrolu ---
const webBtn = document.getElementById('weblearn');
async function webStatus() {
  try {
    const j = await (await fetch('/api/web/status')).json();
    const s = document.getElementById('webstat');
    if (j.running) { s.textContent = '🌐 öğreniyor…'; }
    else {
      let t = j.enabled ? 'oto: açık' : 'oto: kapalı';
      if (j.last_run) t += ` · son: ${j.last_run.qa_taught || 0} S/C / ${j.last_run.pages || 0} sayfa`;
      s.textContent = t;
    }
  } catch {}
}
webStatus(); setInterval(webStatus, 15000);
webBtn.onclick = async () => {
  webBtn.disabled = true; const o = webBtn.textContent; webBtn.textContent = 'başlatılıyor…';
  try {
    const j = await (await fetch('/api/web/study', { method: 'POST' })).json();
    if (j.ok) {
      toast('web öğrenme başladı 🌐');
      for (let i = 0; i < 80; i++) {
        await new Promise(r => setTimeout(r, 3000));
        const st = await (await fetch('/api/web/status')).json();
        webStatus();
        if (!st.running && st.last_run) { toast(`web öğrenildi: ${st.last_run.qa_taught} S/C · ${st.last_run.pages} sayfa`); break; }
      }
    } else { toast('başlamadı: ' + (j.error || '?'), false); }
  } catch (e) { toast('bağlantı hatası', false); }
  webBtn.disabled = false; webBtn.textContent = o;
};

// --- konusmali duzeltme: dogal sohbette "yanlis, tekrar dusun" -> ogren ---
let lastUserQ = null;       // Bilge'nin normal yanitladigi son soru
let awaitingFix = false;    // kullanicidan dogru cevabi bekliyoruz
const CORRECTION_RE = /(yanl[ıi]ş|hatal[ıi]|olmad[ıi]|yan[ıi]l[ıi]yor|öyle de[ğg]il|bu de[ğg]il|tekrar (düşün|dene|bak)|dikkatli|düzelt|eksik|do[ğg]ru de[ğg]il)/i;
const ANSWER_RE = /(?:do[ğg]rusu|do[ğg]ru cevap|asl[ıi]nda|cevab[ıi]|cevap|olmal[ıi])[:\s]+(.+)$/i;
function isCorrection(t) { return CORRECTION_RE.test(t); }
// Cevap cope mi dondu? ("b a" gibi tek harfler, asiri tekrar, bos)
function looksDegenerate(t) {
  const s = (t || '').trim();
  if (s.length < 2) return true;
  const words = s.split(/\s+/).filter(Boolean);
  if (!words.length) return true;
  const oneChar = words.filter(w => w.replace(/[^0-9a-zçğıöşü]/gi, '').length <= 1).length;
  if (words.length >= 2 && oneChar / words.length > 0.6) return true;
  const uniq = new Set(words.map(w => w.toLowerCase()));
  if (words.length >= 6 && uniq.size <= 2) return true;
  return false;
}
function extractFix(t) {
  const m = t.match(ANSWER_RE);
  return (m && m[1] && m[1].trim().length > 1) ? m[1].trim() : null;
}
function bilgeSay(text) { const { msg } = addAI(); msg.textContent = text; }
async function learnFix(question, answer) {
  const { msg } = addAI(); msg.classList.add('blink'); msg.textContent = 'öğreniyorum…';
  try {
    const j = await (await fetch('/api/teach', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: question, assistant: answer, steps: 8, save: false }),
    })).json();
    msg.classList.remove('blink');
    if (j.ok) {
      msg.textContent = 'Teşekkürler, öğrendim! 🙏 Bundan sonra doğrusunu söyleyeceğim:\n' + answer;
      history.push({ role: 'user', content: question });
      history.push({ role: 'assistant', content: answer });
      toast(`öğrenildi ✓ (loss ${j.loss_before} → ${j.loss_after})`);
    } else { msg.textContent = 'Öğrenemedim: ' + (j.error || '?'); }
  } catch (e) { msg.classList.remove('blink'); msg.textContent = 'Bağlantı hatası.'; }
}

function addUser(text) {
  const row = document.createElement('div'); row.className = 'row user';
  const r = document.createElement('div'); r.className = 'role'; r.textContent = 'Sen';
  const m = document.createElement('div'); m.className = 'msg user'; m.textContent = text;
  row.appendChild(r); row.appendChild(m); chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

// Tsetlin hakemi: kullanici mesajinin niyetini OKUNABILIR rozetle goster
async function showIntent(row, text) {
  try {
    const j = await (await fetch('/api/intent', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    })).json();
    if (!j.ok) return;
    const b = document.createElement('div');
    b.style.cssText = 'font-size:10px;color:var(--muted);margin:2px 6px 0;align-self:flex-end;cursor:help;';
    b.textContent = '🏷️ ' + j.label + (j.in_scope ? '' : ' · kapsam dışı olabilir ⚠️');
    if (j.rule) b.title = 'Tsetlin kuralı: EĞER ' + j.rule;
    row.appendChild(b);
  } catch {}
}

function addAI() {
  const row = document.createElement('div'); row.className = 'row ai';
  const r = document.createElement('div'); r.className = 'role'; r.textContent = 'Bilge';
  const m = document.createElement('div'); m.className = 'msg ai'; m.textContent = '';
  row.appendChild(r); row.appendChild(m); chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return { row, msg: m };
}

function addTeachControls(row, userText, msgEl) {
  const bar = document.createElement('div'); bar.className = 'actions';
  const bThumb = document.createElement('button'); bThumb.className = 'act'; bThumb.textContent = '👍 Bunu öğret';
  const bEdit = document.createElement('button'); bEdit.className = 'act'; bEdit.textContent = '✏️ Düzelt & öğret';
  bar.appendChild(bThumb); bar.appendChild(bEdit);
  row.appendChild(bar);

  bThumb.onclick = async () => {
    bThumb.disabled = true; bThumb.textContent = 'öğreniyor…';
    await teach(userText, msgEl.textContent, bar, bThumb);
  };
  bEdit.onclick = () => {
    if (row.querySelector('.teachbox')) return;
    const box = document.createElement('div'); box.className = 'teachbox';
    const ta = document.createElement('textarea'); ta.value = msgEl.textContent;
    const btns = document.createElement('div'); btns.className = 'tbtns';
    const ok = document.createElement('button'); ok.className = 'act'; ok.textContent = 'Kaydet & öğret';
    const cancel = document.createElement('button'); cancel.className = 'act'; cancel.textContent = 'Vazgeç';
    btns.appendChild(ok); btns.appendChild(cancel); box.appendChild(ta); box.appendChild(btns);
    row.appendChild(box); ta.focus();
    cancel.onclick = () => box.remove();
    ok.onclick = async () => {
      const corrected = ta.value.trim(); if (!corrected) return;
      msgEl.textContent = corrected;
      box.remove();
      await teach(userText, corrected, bar, bThumb);
    };
  };
}

async function teach(userText, assistantText, bar, btn) {
  try {
    const r = await fetch('/api/teach', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: userText, assistant: assistantText, steps: 6, save: false }),
    });
    const j = await r.json();
    if (j.ok) {
      toast(`öğrenildi ✓  (loss ${j.loss_before} → ${j.loss_after})`);
      bar.querySelectorAll('.act').forEach(b => { b.disabled = true; });
      if (btn) { btn.classList.add('learned'); btn.textContent = '✓ öğrenildi'; }
    } else {
      toast('öğrenilemedi: ' + (j.error || '?'), false);
      if (btn) { btn.disabled = false; btn.textContent = '👍 Bunu öğret'; }
    }
  } catch (e) {
    toast('bağlantı hatası', false);
    if (btn) { btn.disabled = false; btn.textContent = '👍 Bunu öğret'; }
  }
}

async function saveModel() {
  const b = document.getElementById('save');
  b.disabled = true; const old = b.textContent; b.textContent = 'kaydediliyor…';
  try {
    const r = await fetch('/api/save', { method: 'POST' });
    const j = await r.json();
    toast(j.ok ? 'model kaydedildi ✓' : ('kaydedilemedi: ' + (j.error || '?')), j.ok);
  } catch { toast('kaydedilemedi', false); }
  b.disabled = false; b.textContent = old;
}

async function send() {
  if (busy) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';

  // 1) Dogru cevabi bekliyorduk -> bu mesaj duzeltmedir, ogren
  if (awaitingFix && lastUserQ) {
    awaitingFix = false; addUser(text);
    busy = true; sendBtn.disabled = true;
    await learnFix(lastUserQ, text);
    busy = false; sendBtn.disabled = false; input.focus(); return;
  }
  // 2) Itiraz/duzeltme ("yanlis, tekrar dusun" vb.)
  if (isCorrection(text) && lastUserQ) {
    addUser(text);
    const fix = extractFix(text);
    if (fix) {
      busy = true; sendBtn.disabled = true;
      await learnFix(lastUserQ, fix);
      busy = false; sendBtn.disabled = false;
    } else {
      bilgeSay('Özür dilerim, dikkatlice tekrar düşüneyim. 🤔 Doğru cevabı yazar mısın? Onu öğrenip bir daha aynı hatayı yapmayayım.');
      awaitingFix = true;
    }
    input.focus(); return;
  }

  // 3) Normal sohbet
  const uRow = addUser(text);
  showIntent(uRow, text);            // Tsetlin niyet rozeti (arka planda)
  history.push({ role: 'user', content: text });

  busy = true; sendBtn.disabled = true;
  const { row, msg: aiEl } = addAI(); aiEl.classList.add('blink');
  let full = '';

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: history,
        temperature: +temp.value,
        max_new_tokens: +maxtok.value,
      }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const data = JSON.parse(line.slice(5).trim());
        if (data.error) { full += '\n[hata: ' + data.error + ']'; }
        else if (data.token) { full += data.token; }
        aiEl.textContent = full;
        chat.scrollTop = chat.scrollHeight;
      }
    }
  } catch (e) {
    full += '\n[baglanti hatasi: ' + e + ']'; aiEl.textContent = full;
  }

  aiEl.classList.remove('blink');
  if (looksDegenerate(full)) {
    // Bilmiyor: cop yerine durust cevap + ogretmeye hazirla
    aiEl.textContent = 'Bunu tam bilmiyorum 🤔 İstersen doğru cevabı yaz, hemen öğreneyim — bir daha sorduğunda bileyim.';
    lastUserQ = text; awaitingFix = true;
  } else {
    history.push({ role: 'assistant', content: full });
    addTeachControls(row, text, aiEl); lastUserQ = text;
  }
  busy = false; sendBtn.disabled = false; input.focus();
}
</script>
</body>
</html>
